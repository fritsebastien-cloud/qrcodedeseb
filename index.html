<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le QR Code de Seb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="screen-welcome" class="screen active">
    <div class="card">
      <div class="logo-icon">&#x1F3B2;</div>
      <h1>Le QR Code de Seb</h1>
      <p class="subtitle">Tu viens de scanner mon tatouage, bravo !<br>Tente ta chance et entre dans le classement.</p>
      <button id="btn-play" class="btn-primary">Tirer mon nombre</button>
      <button id="btn-leaderboard" class="btn-secondary">Voir le classement</button>
    </div>
  </div>
  <div id="screen-roll" class="screen">
    <div class="card">
      <p class="roll-label">Ton nombre est...</p>
      <div id="roll-number" class="roll-number">&mdash;</div>
      <div id="name-form" class="name-form hidden">
        <input type="text" id="name-input" class="input-name" placeholder="Ton pr&eacute;nom" maxlength="30" autocomplete="off" />
        <button id="btn-save" class="btn-primary">Enregistrer mon score</button>
      </div>
      <p id="save-msg" class="save-msg hidden"></p>
      <button id="btn-to-leaderboard" class="btn-secondary hidden">Voir le classement</button>
      <button id="btn-back-home" class="btn-link">Retour</button>
    </div>
  </div>
  <div id="screen-leaderboard" class="screen">
    <div class="card card-wide">
      <h2>&#x1F3C6; Classement</h2>
      <p class="lb-subtitle">Plus ton nombre est bas, mieux tu es classé !</p>
      <div id="leaderboard-list" class="leaderboard-list">
        <p class="loading-text">Chargement...</p>
      </div>
      <div class="lb-footer">
        <span id="total-players" class="total-players"></span>
        <button id="btn-back" class="btn-secondary">Retour</button>
      </div>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
