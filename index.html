<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Jeu du Bras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <canvas id="confetti-canvas"></canvas>
  <div id="roll-flash"></div>
  <div id="screen-welcome" class="screen active">
    <div class="card">
      <div class="logo-icon">&#x1F3B2;</div>
      <h1>Le Jeu du Bras</h1>
      <p class="subtitle">L'objectif : faire le plus petit score possible !<br>Tente ta chance et entre dans le classement.</p>
      <p id="scan-counter" class="scan-counter"></p>
      <p id="already-played" class="scan-counter hidden" style="color:#f5a623;font-weight:600;">Tu as déjà joué ! Rescanne le QR code ou rafraîchis la page pour retenter ta chance.</p>
      <button id="btn-play" class="btn-primary btn-play-big">Tire ton nombre</button>
    </div>
  </div>
  <div id="screen-roll" class="screen">
    <div class="card">
      <p class="roll-label">Ton score est...</p>
      <div id="roll-number" class="roll-number">&mdash;</div>
      <div id="fun-message" class="fun-message"></div>
      <div id="name-form" class="name-form hidden">
        <input type="text" id="name-input" class="input-name" placeholder="Ton pr&eacute;nom" maxlength="30" autocomplete="off" />
        <button id="btn-save" class="btn-primary">Enregistrer mon score</button>
      </div>
      <p id="save-msg" class="save-msg hidden"></p>
      <div id="rank-reveal" class="rank-reveal hidden"></div>
      <button id="btn-to-leaderboard" class="btn-secondary hidden">Voir le classement</button>
    </div>
  </div>
  <div id="screen-leaderboard" class="screen">
    <div class="card card-wide">
      <h2>&#x1F3C6; Classement</h2>
      <p class="lb-subtitle">Plus ton nombre est bas, mieux tu es classé !</p>
      <div id="leaderboard-list" class="leaderboard-list">
        <p class="loading-text">Chargement...</p>
      </div>
      <div class="lb-footer">
        <span id="total-players" class="total-players"></span>
        <button id="btn-back" class="btn-secondary">Retour</button>
      </div>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
